---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: home
spec:
  interval: 15m
  chart:
    spec:
      chart: jellyfin
      version: 10.8.10-rc.2
      sourceRef:
        kind: HelmRepository
        name: olympus
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    persistence:
      config:
        existingClaim: jellyfin-config-pvc
      cache:
        existingClaim: jellyfin-cache-pvc
      media:
        existingClaim: jellyfin-media-pvc
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        hajimari.io/icon: video-input-antenna
      hosts:
        - host: &host "jellyfin.${SECRET_DOMAIN}"
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - *host
