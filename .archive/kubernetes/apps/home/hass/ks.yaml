---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-home-hass
  namespace: flux-system
spec:
  dependsOn:
    - name: cluster-apps-echo-server
    - name: cluster-database-postgresql
    - name: cluster-home-emqx
  path: ./kubernetes/apps/home/hass/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta1
      kind: HelmRelease
      name: hass
      namespace: home
  interval: 30m
  retryInterval: 1m
  timeout: 10m
