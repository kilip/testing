---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-storage-nfs-provisioner
  namespace: flux-system
spec:
  path: ./kubernetes/base/storage/nfs/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta1
      kind: HelmRelease
      name: nfs-provisioner
      namespace: storage
  interval: 30m
  retryInterval: 1m
  timeout: 6m
