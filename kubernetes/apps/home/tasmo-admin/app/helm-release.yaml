---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: tasmo-admin
  namespace: home
spec:
  interval: 15m
  chart:
    spec:
      chart: tasmo-admin
      version: 3.0.2-rc.3
      sourceRef:
        kind: HelmRepository
        name: olympus
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    persistence:
      enabled: true
      existingClaim: tasmoadmin-pvc
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        hajimari.io/icon: video-input-antenna
      hosts:
        - host: &host "tasmota.${SECRET_DOMAIN}"
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - *host
